<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - OFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root { --v: #00ff88; --b: #0a0a0a; }
        body { background: var(--b); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #121212; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; }
        .header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .header h1 { color: var(--v); font-size: 1.1em; margin: 0; }
        .canal-btn { width: 100%; background: #222; color: #eee; border: 1px solid #333; padding: 12px; margin-bottom: 8px; text-align: left; cursor: pointer; border-radius: 6px; font-size: 14px; }
        .canal-btn:hover { background: var(--v); color: black; font-weight: bold; }
        #player-area { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #player { width: 100%; height: 85vh; background: #000; }
        .status { padding: 15px; background: #121212; border-top: 1px solid #222; text-align: center; color: var(--v); font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h1>FAMILIA PRADA</h1>
        <small style="color:#666">TV NACIONAL PERÚ</small>
    </div>
    
    <button class="canal-btn" onclick="cambiar('https://redirector.rudo.video/hls-video/567ffde3fa319fadf3419efda25619456231dfea/latina/latina.smil/playlist.m3u8')">🔴 LATINA HD</button>
    <button class="canal-btn" onclick="cambiar('https://d2tr6nyh7909as.cloudfront.net/atv/playlist.m3u8')">🔴 ATV HD</button>
    <button class="canal-btn" onclick="cambiar('https://d2tr6nyh7909as.cloudfront.net/panamericana/playlist.m3u8')">🔴 PANAMERICANA</button>
    <button class="canal-btn" onclick="cambiar('https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8')">🔴 TV PERÚ (OFICIAL)</button>
    <button class="canal-btn" onclick="cambiar('https://cdn.btvperu.com/live/betel/playlist.m3u8')">🔴 BETEL TV</button>
    <button class="canal-btn" onclick="cambiar('https://5a39626354366.streamlock.net/ucayalina/ucayalina/playlist.m3u8')">🔴 UCAYALINA TV</button>
</div>

<div id="player-area">
    <div id="player"></div>
    <div class="status" id="st">TRANSMISIÓN LISTA</div>
</div>

<script>
    var player = new Clappr.Player({
        parentId: "#player",
        width: '100%',
        height: '100%',
        autoPlay: true,
        mute: false
    });

    function cambiar(url) {
        document.getElementById('st').innerText = "SINTONIZANDO...";
        player.load(url);
        player.play();
        setTimeout(() => { document.getElementById('st').innerText = "EN VIVO - SEÑAL ESTABLE"; }, 2000);
    }
</script>
</body>
</html>
