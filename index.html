<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - PRO</title>
    <style>
        :root { --v: #00ff88; --b: #050505; }
        body { background: var(--b); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .header h1 { color: var(--v); font-size: 1.2em; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .btn { width: 100%; background: #1a1a1a; color: #eee; border: 1px solid #333; padding: 12px; margin-bottom: 8px; text-align: left; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .btn:hover { background: var(--v); color: #000; font-weight: bold; }
        #screen { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .footer { padding: 10px; background: #111; border-top: 1px solid #222; text-align: center; color: var(--v); font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"><h1>FAMILIA PRADA</h1></div>
    <div style="font-size: 10px; color: #555; margin-bottom: 10px;">SEÑAL NACIONAL VIP</div>
    
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/latina')">🔴 LATINA HD</button>
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/americatv')">🔴 AMÉRICA TV</button>
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/atv')">🔴 ATV HD</button>
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/panamericana')">🔴 PANAMERICANA</button>
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/willax')">🔴 WILLAX TV</button>
    <button class="btn" onclick="load('https://pepper-tube.com/player/embed/tvperu')">🔴 TV PERÚ</button>
</div>

<div id="screen">
    <iframe id="reproductor" src="about:blank" allowfullscreen allow="autoplay"></iframe>
    <div class="footer">ADMIN: JOSUE PRADA | SISTEMA DE TRANSMISIÓN DIRECTA</div>
</div>

<script>
    function load(url) {
        // El iframe salta el error de manifestLoadError porque el servidor pepper-tube hace el trabajo pesado
        document.getElementById('reproductor').src = url;
    }
</script>
</body>
</html>
