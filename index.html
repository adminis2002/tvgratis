<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV PERÚ - FAMILIA PRADA</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root { --verde: #00ff88; --fondo: #0a0a0a; --panel: #161616; }
        body { background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: var(--verde); font-size: 1.2em; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .canal-btn { width: 100%; background: #222; color: #eee; border: 1px solid #333; padding: 15px; margin-bottom: 10px; text-align: left; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 14px; display: flex; align-items: center; }
        .canal-btn:hover { background: var(--verde); color: black; font-weight: bold; transform: translateX(5px); }
        .canal-btn i { margin-right: 10px; }

        #player-wrapper { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #player { width: 100%; height: 85vh; background: #000; }
        .footer { padding: 15px; background: var(--panel); border-top: 1px solid #222; text-align: center; }
        .status { color: var(--verde); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h1>FAMILIA PRADA</h1>
        <small style="color: #666;">TV NACIONAL PERÚ</small>
    </div>
    
    <button class="canal-btn" onclick="cambiarCanal('https://redirector.rudo.video/hls-video/567ffde3fa319fadf3419efda25619456231dfea/latina/latina.smil/playlist.m3u8')">🔴 LATINA HD</button>
    <button class="canal-btn" onclick="cambiarCanal('https://d2tr6nyh7909as.cloudfront.net/atv/playlist.m3u8')">🔴 ATV HD</button>
    <button class="canal-btn" onclick="cambiarCanal('https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8')">🔴 TV PERÚ (OFICIAL)</button>
    <button class="canal-btn" onclick="cambiarCanal('https://panamericana.pe/live/panamericana/playlist.m3u8')">🔴 PANAMERICANA</button>
    <button class="canal-btn" onclick="cambiarCanal('https://cdn.btvperu.com/live/betel/playlist.m3u8')">🔴 BETEL TV</button>
    <button class="canal-btn" onclick="cambiarCanal('https://5a39626354366.streamlock.net/ucayalina/ucayalina/playlist.m3u8')">🔴 UCAYALINA TV</button>
</div>

<div id="player-wrapper">
    <div id="player"></div>
    <div class="footer">
        <div class="status" id="info-text">SISTEMA EN LÍNEA - SELECCIONE CANAL</div>
        <div style="color: #444; font-size: 11px; margin-top: 5px;">Admin: Josué Prada | Conexión Directa</div>
    </div>
</div>

<script>
    // Inicializar reproductor con TV Perú por defecto
    var player = new Clappr.Player({
        source: 'https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8',
        parentId: '#player',
        width: '100%',
        height: '100%',
        autoPlay: false,
        mute: false,
        placeholder: "https://i.imgur.com/8N4p4tO.png",
        mediacontrol: {seekbar: "#00ff88", buttons: "#00ff88"}
    });

    function cambiarCanal(url) {
        document.getElementById('info-text').innerText = "SINTONIZANDO SEÑAL...";
        player.load(url);
        player.play();
        setTimeout(() => {
            document.getElementById('info-text').innerText = "TRANSMITIENDO EN VIVO";
        }, 3000);
    }
</script>

</body>
</html>
