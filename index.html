<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - SUPREMO</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root { --v: #00ff88; --b: #050505; }
        body { background: var(--b); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #111; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .header h1 { color: var(--v); font-size: 1.2em; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .btn { width: 100%; background: #1a1a1a; color: #eee; border: 1px solid #333; padding: 14px; margin-bottom: 8px; text-align: left; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: var(--v); color: #000; transform: translateX(5px); }
        #player-wrapper { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        #player { width: 100%; height: 85vh; background: #000; }
        .footer { padding: 15px; background: #111; border-top: 1px solid #222; text-align: center; color: var(--v); font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"><h1>FAMILIA PRADA</h1></div>
    <button class="btn" onclick="play('https://redirector.rudo.video/hls-video/567ffde3fa319fadf3419efda25619456231dfea/latina/latina.smil/playlist.m3u8')">🔴 LATINA HD</button>
    <button class="btn" onclick="play('https://d1fcl8p169st90.cloudfront.net/out/v1/37482862377b427b871c841362e1c944/index.m3u8')">🔴 AMÉRICA TV</button>
    <button class="btn" onclick="play('https://d2tr6nyh7909as.cloudfront.net/atv/playlist.m3u8')">🔴 ATV HD</button>
    <button class="btn" onclick="play('https://d2tr6nyh7909as.cloudfront.net/panamericana/playlist.m3u8')">🔴 PANAMERICANA</button>
    <button class="btn" onclick="play('https://d170tbtpizfnc5.cloudfront.net/out/v1/70868f0813734680879555c829e2898b/index.m3u8')">🔴 WILLAX TV</button>
    <button class="btn" onclick="play('https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8')">🔴 TV PERÚ</button>
</div>

<div id="player-wrapper">
    <div id="player"></div>
    <div class="footer" id="status">CONEXIÓN DIRECTA | ADMIN: JOSUE PRADA</div>
</div>

<script>
    var player = new Clappr.Player({
        parentId: "#player",
        width: '100%',
        height: '100%',
        autoPlay: true,
        mute: false,
        mediacontrol: {seekbar: "#00ff88", buttons: "#00ff88"}
    });

    function play(url) {
        document.getElementById('status').innerText = "SINTONIZANDO...";
        player.load(url);
        player.play();
        setTimeout(() => { document.getElementById('status').innerText = "EN VIVO - SEÑAL PURA"; }, 2000);
    }
</script>
</body>
</html>
