<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - VIP</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <style>
        :root { --v: #00ff88; --b: #050505; }
        body { background: var(--b); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .header h1 { color: var(--v); font-size: 1.2em; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .btn { width: 100%; background: #1a1a1a; color: #eee; border: 1px solid #333; padding: 12px; margin-bottom: 8px; text-align: left; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .btn:hover { background: var(--v); color: #000; font-weight: bold; }
        #screen { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .video-js { width: 100% !important; height: 85vh !important; }
        .footer { padding: 15px; background: #111; border-top: 1px solid #222; text-align: center; color: var(--v); font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"><h1>FAMILIA PRADA</h1></div>
    <div style="font-size: 10px; color: #555; margin-bottom: 10px;">SEÑAL NACIONAL ESTABLE</div>
    
    <button class="btn" onclick="play('https://redirector.rudo.video/hls-video/567ffde3fa319fadf3419efda25619456231dfea/latina/latina.smil/playlist.m3u8')">🔴 LATINA HD</button>
    <button class="btn" onclick="play('https://d1fcl8p169st90.cloudfront.net/out/v1/37482862377b427b871c841362e1c944/index.m3u8')">🔴 AMÉRICA TV</button>
    <button class="btn" onclick="play('https://d2tr6nyh7909as.cloudfront.net/atv/playlist.m3u8')">🔴 ATV HD</button>
    <button class="btn" onclick="play('https://d2tr6nyh7909as.cloudfront.net/panamericana/playlist.m3u8')">🔴 PANAMERICANA</button>
    <button class="btn" onclick="play('https://willax.tv/live/playlist.m3u8')">🔴 WILLAX TV</button>
    <button class="btn" onclick="play('https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8')">🔴 TV PERÚ</button>
</div>

<div id="screen">
    <video id="my-video" class="video-js vjs-big-play-centered" controls autoplay preload="auto"></video>
    <div class="footer" id="msg">ADMIN: JOSUE PRADA | SISTEMA NACIONAL</div>
</div>

<script>
    var player = videojs('my-video');

    function play(url) {
        document.getElementById('msg').innerText = "CONECTANDO A LA TRABA DE RED...";
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
        player.play();
        setTimeout(() => { document.getElementById('msg').innerText = "EN VIVO - SEÑAL PROTEGIDA"; }, 2000);
    }
</script>
</body>
</html>
