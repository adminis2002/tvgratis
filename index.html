<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - PANEL OFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral */
        #sidebar { width: 300px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid #222; }
        .header h1 { color: var(--accent); margin: 0; font-size: 20px; letter-spacing: 1px; }
        .header p { font-size: 10px; color: #666; text-transform: uppercase; margin: 5px 0 0; }
        
        .list-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .category { font-size: 11px; color: var(--accent); opacity: 0.6; margin: 15px 0 8px 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .canal-btn { width: 100%; background: #1a1a1a; color: #bbb; border: 1px solid #222; padding: 12px 15px; margin-bottom: 6px; text-align: left; cursor: pointer; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; }
        .canal-btn:hover { background: #222; color: var(--accent); border-color: var(--accent); transform: translateX(5px); }

        /* Área de Video */
        #player-area { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        video { width: 100%; height: 75vh; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .footer { padding: 20px; background: linear-gradient(to bottom, #000, var(--panel)); flex-grow: 1; }
        #status-text { margin: 0; color: var(--accent); font-size: 18px; }
        .admin-info { font-size: 12px; color: #444; margin-top: 8px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h1>TV FAMILIA PRADA</h1>
        <p>Sistema de Streaming Privado</p>
    </div>
    
    <div class="list-container">
        <div class="category">Señal Nacional Lima</div>
        <button class="canal-btn" onclick="play('https://sc.latina.pe/live/latina/playlist.m3u8', 'Latina HD')">📺 Latina HD</button>
        <button class="canal-btn" onclick="play('https://atv.pe/live/atv/playlist.m3u8', 'ATV HD')">📺 ATV HD</button>
        <button class="canal-btn" onclick="play('https://panamericana.pe/live/panamericana/playlist.m3u8', 'Panamericana')">📺 Panamericana</button>
        <button class="canal-btn" onclick="play('https://cdnb.tvperu.gob.pe/live/tvperu/playlist.m3u8', 'TV Perú')">📺 TV Perú</button>
        
        <div class="category">Cultura y Religión</div>
        <button class="canal-btn" onclick="play('https://cdn.btvperu.com/live/betel/playlist.m3u8', 'Betel TV')">🙏 Betel TV</button>

        <div class="category">Películas y Cine</div>
        <button class="canal-btn" onclick="play('https://service-stitcher.clusters.pluto.tv/stitch/hls/channel/58a33a05f17f4116938927a4/master.m3u8?deviceType=web', 'Cine Acción')">🎬 Cine Acción</button>
        <button class="canal-btn" onclick="play('https://service-stitcher.clusters.pluto.tv/stitch/hls/channel/5a2ec3b73551f107f9c2d765/master.m3u8?deviceType=web', 'Cine Terror')">🎬 Cine Terror</button>
        <button class="canal-btn" onclick="play('https://service-stitcher.clusters.pluto.tv/stitch/hls/channel/5d669299403a4c0009c95d9e/master.m3u8?deviceType=web', 'Cine Kids')">🎬 Películas Niños</button>
    </div>
</div>

<div id="player-area">
    <video id="video" controls autoplay playsinline></video>
