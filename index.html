<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV FAMILIA PRADA - ULTRA</title>
    <style>
        :root { --v: #00ff88; --b: #080808; }
        body { background: var(--b); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .header h1 { color: var(--v); font-size: 1.2em; text-align: center; border-bottom: 2px solid var(--v); padding-bottom: 15px; margin-bottom: 20px; }
        .btn { width: 100%; background: #1a1a1a; color: #eee; border: 1px solid #333; padding: 14px; margin-bottom: 8px; text-align: left; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--v); color: #000; transform: scale(1.02); }
        #screen { flex-grow: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .footer { position: absolute; bottom: 0; width: 100%; padding: 10px; background: rgba(0,0,0,0.8); text-align: center; color: var(--v); font-size: 12px; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"><h1>FAMILIA PRADA</h1></div>
    <button class="btn" onclick="load('latina')">🔴 LATINA HD</button>
    <button class="btn" onclick="load('americatv')">🔴 AMÉRICA TV</button>
    <button class="btn" onclick="load('atv')">🔴 ATV HD</button>
    <button class="btn" onclick="load('panamericana')">🔴 PANAMERICANA</button>
    <button class="btn" onclick="load('willax')">🔴 WILLAX TV</button>
    <button class="btn" onclick="load('tvperu')">🔴 TV PERÚ</button>
</div>

<div id="screen">
    <iframe id="player" src="about:blank" allowfullscreen allow="autoplay"></iframe>
    <div class="footer">SISTEMA ULTRA-ESTABLE | ADMIN: JOSUE PRADA</div>
</div>

<script>
    function load(canal) {
        // Este servidor funciona como Proxy para saltar todos los bloqueos de Lima
        const bridge = "https://pepper-tube.com/player/embed/";
        document.getElementById('player').src = bridge + canal;
    }
</script>
</body>
</html>
